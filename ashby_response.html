    <script type="application/ld+json">{"@context":"https://schema.org/","@type":"JobPosting","title":"AI Engineer (Agents Lead)","description":"<h1>AI Engineer (Agent Lead)</h1><p style=\"min-height:1.5em\"><strong>Location:</strong> Remote (Pacific Time preferred)<br /><strong>Type:</strong> Full-time</p><p style=\"min-height:1.5em\"></p><h2>About Tambo</h2><p style=\"min-height:1.5em\">Tambo is an open-source toolkit for building agents that render your React components. We're five people, pre-seed, building infrastructure for AI-native apps. Everyone operates like a mini-founder for their area.</p><p style=\"min-height:1.5em\"></p><h2>The Role</h2><p style=\"min-height:1.5em\">You'll own the agent systems that make Tambo work. That means building the runtime, improving how agents reason and act, and figuring out what's possible when AI meets visual interfaces.</p><p style=\"min-height:1.5em\">We're not looking for someone who's \"interested in agents.\" We want someone who's built them.</p><p style=\"min-height:1.5em\"></p><h2>What You'll Do</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Build agent architectures that are fast, reliable, and actually pleasant to work with</p></li><li><p style=\"min-height:1.5em\">Research and ship techniques for agent reasoning, planning, and tool use</p></li><li><p style=\"min-height:1.5em\">Create evaluation pipelines so we can measure whether agents are getting better or worse</p></li><li><p style=\"min-height:1.5em\">Talk to users. Understand what's broken. Fix it.</p></li></ul><h2>What We're Looking For</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">5+ years shipping software</p></li><li><p style=\"min-height:1.5em\">You've actually built agents or LLM-powered apps (not just played with them)</p></li><li><p style=\"min-height:1.5em\">You understand what LLMs can and can't do</p></li><li><p style=\"min-height:1.5em\">You're comfortable with ambiguity. We're five people. There's no playbook.</p></li></ul><h2>Bonus Points</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Experience with TypeScript</p></li><li><p style=\"min-height:1.5em\">Open-source or developer tools background</p></li><li><p style=\"min-height:1.5em\">You've written or published stuff about agents</p></li><li><p style=\"min-height:1.5em\">You've built or worked on coding agents</p><p style=\"min-height:1.5em\"></p></li></ul><p style=\"min-height:1.5em\"><em><strong>Comp may shift based on location and experience.</strong></em></p>","directApply":false,"identifier":{"@type":"PropertyValue","name":"Tambo","value":"39fcac07-6f9f-4e49-a989-26ca75aa5d5a"},"datePosted":"2026-01-31","hiringOrganization":{"@type":"Organization","name":"Tambo","sameAs":"https://tambo.co/","logo":"https://app.ashbyhq.com/api/images/org-theme-logo/bba540ed-05b9-4019-99e2-a24513a74ea2/fcc43a05-deed-4a53-8f1c-43f579ce4c84/03e7ea2e-1918-4d4c-95ae-a172162b504d.png"},"jobLocation":{"@type":"Place","address":{"@type":"PostalAddress","addressLocality":"United States","addressCountry":"United States"}},"employmentType":"FULL_TIME","baseSalary":{"@type":"MonetaryAmount","currency":"USD","value":{"@type":"QuantitativeValue","minValue":180000,"maxValue":240000,"unitText":"YEAR"}},"jobLocationType":"TELECOMMUTE","applicantLocationRequirements":{"@type":"Country","name":"United States"}}</script>

lute;border:0\" allowfullscreen scrolling=\"no\" allow=\"encrypted-media *; picture-in-picture *;\" sandbox=\"allow-scripts allow-same-origin allow-presentation\"></iframe></div></div><p style=\"min-height:1.5em\">If you haven't already, go check out our <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://github.com/tambo-ai/tambo\">open-source</a> GitHub repo. In the last 2 months we have been the #1 Trending Repo on Github, we've gained 9,000+ stars, and we've been feature in Developer newsletters like: TLDR, This Week in React, and React Status.</p><div style=\"text-align:left\"><img style=\"max-width:100%\" src=\"https://app.ashbyhq.com/api/images/user-content/bba540ed-05b9-4019-99e2-a24513a74ea2/1983a6a6-9e46-4ad9-b1eb-b78452a56b27/Screenshot%202026-02-14%20at%203.22.45%E2%80%AFPM.png\" /></div><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\">Developers at startups and Fortune 1000 companies are already building with Tambo.</p><p style=\"min-height:1.5em\">The founding team came from <strong>Google</strong>, <strong>Microsoft</strong>, and <strong>Indeed</strong>. We're backed by top angels like <strong>Drew Houston</strong> (CEO, Dropbox), <strong>Eric Wittman</strong> (CEO, VSCO), <strong>Dan Lewis</strong> (CVP, Microsoft AI), and <strong>The General Partnership</strong>.</p><p style=\"min-height:1.5em\">We are hiring across a few different roles to help us achieve our mission of helping developers build UIs for the post-AI world.</p>","jobBoardBottomDescriptionHtml":"<p style=\"min-height:1.5em\"><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://tambo.co\">tambo.co</a> | <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://github.com/tambo-ai/tambo\">open-source repo</a></p>","jobPostingBackUrl":null},"appConfirmationTrackingPixelHtml":null,"timezone":"America/Los_Angeles","candidateScheduleCancellationReasonRequirementStatus":"Optional"},"posting":{"id":"39fcac07-6f9f-4e49-a989-26ca75aa5d5a","title":"AI Engineer (Agents Lead)","updatedAt":"2026-02-06T07:13:54.891Z","departmentName":"01Engineering","departmentExternalName":"Engineering","teamName":"01Engineering","teamExternalName":"Engineering","teamNames":["Engineering"],"locationName":"Remote (United States)","locationExternalName":"Remote (United States)","isListed":true,"suppressDescriptionOpening":false,"suppressDescriptionClosing":false,"descriptionHtml":"<h1>AI Engineer (Agent Lead)</h1><p style=\"min-height:1.5em\"><strong>Location:</strong> Remote (Pacific Time preferred)<br /><strong>Type:</strong> Full-time</p><p style=\"min-height:1.5em\"></p><h2>About Tambo</h2><p style=\"min-height:1.5em\">Tambo is an open-source toolkit for building agents that render your React components. We're five people, pre-seed, building infrastructure for AI-native apps. Everyone operates like a mini-founder for their area.</p><p style=\"min-height:1.5em\"></p><h2>The Role</h2><p style=\"min-height:1.5em\">You'll own the agent systems that make Tambo work. That means building the runtime, improving how agents reason and act, and figuring out what's possible when AI meets visual interfaces.</p><p style=\"min-height:1.5em\">We're not looking for someone who's \"interested in agents.\" We want someone who's built them.</p><p style=\"min-height:1.5em\"></p><h2>What You'll Do</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Build agent architectures that are fast, reliable, and actually pleasant to work with</p></li><li><p style=\"min-height:1.5em\">Research and ship techniques for agent reasoning, planning, and tool use</p></li><li><p style=\"min-height:1.5em\">Create evaluation pipelines so we can measure whether agents are getting better or worse</p></li><li><p style=\"min-height:1.5em\">Talk to users. Understand what's broken. Fix it.</p></li></ul><h2>What We're Looking For</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">5+ years shipping software</p></li><li><p style=\"min-height:1.5em\">You've actually built agents or LLM-powered apps (not just played with them)</p></li><li><p style=\"min-height:1.5em\">You understand what LLMs can and can't do</p></li><li><p style=\"min-height:1.5em\">You're comfortable with ambiguity. We're five people. There's no playbook.</p></li></ul><h2>Bonus Points</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Experience with TypeScript</p></li><li><p style=\"min-height:1.5em\">Open-source or developer tools background</p></li><li><p style=\"min-height:1.5em\">You've written or published stuff about agents</p></li><li><p style=\"min-height:1.5em\">You've built or worked on coding agents</p><p style=\"min-height:1.5em\"></p></li></ul><p style=\"min-height:1.5em\"><em><strong>Comp may shift based on location and experience.</strong></em></p>","descriptionPlainText":"AI ENGINEER (AGENT LEAD)\n\nLocation: Remote (Pacific Time preferred)\nType: Full-time\n\n\nABOUT TAMBO\n\nTambo is an open-source toolkit for building agents that render your React components. We're five people, pre-seed, building infrastructure for AI-native apps. Everyone operates like a mini-founder for their area.\n\n\nTHE ROLE\n\nYou'll own the agent systems that make Tambo work. That means building the runtime, improving how agents reason and act, and figuring out what's possible when AI meets visual interfaces.\n\nWe're not looking for someone who's \"interested in agents.\" We want someone who's built them.\n\n\nWHAT YOU'LL DO\n\n - Build agent architectures that are fast, reliable, and actually pleasant to work with\n\n - Research and ship techniques for agent reasoning, planning, and tool use\n\n - Create evaluation pipelines so we can measure whether agents are getting better or worse\n\n - Talk to users. Understand what's broken. Fix it.\n\n\nWHAT WE'RE LOOKING FOR\n\n - 5+ years shipping software\n\n - You've actually built agents or LLM-powered apps (not just played with them)\n\n - You understand what LLMs can and can't do\n\n - You're comfortable with ambiguity. We're five people. There's no playbook.\n\n\nBONUS POINTS\n\n - Experience with TypeScript\n\n - Open-source or developer tools background\n\n - You've written or published stuff about agents\n\n - You've built or worked on coding agents\n\nComp may shift based on location and experience.","descriptionParts":{"descriptionOpening":null,"descriptionBody":{"html":"<h1>AI Engineer (Agent Lead)</h1><p style=\"min-height:1.5em\"><strong>Location:</strong> Remote (Pacific Time preferred)<br /><strong>Type:</strong> Full-time</p><p style=\"min-height:1.5em\"></p><h2>About Tambo</h2><p style=\"min-height:1.5em\">Tambo is an open-source toolkit for building agents that render your React components. We're five people, pre-seed, building infrastructure for AI-native apps. Everyone operates like a mini-founder for their area.</p><p style=\"min-height:1.5em\"></p><h2>The Role</h2><p style=\"min-height:1.5em\">You'll own the agent systems that make Tambo work. That means building the runtime, improving how agents reason and act, and figuring out what's possible when AI meets visual interfaces.</p><p style=\"min-height:1.5em\">We're not looking for someone who's \"interested in agents.\" We want someone who's built them.</p><p style=\"min-height:1.5em\"></p><h2>What You'll Do</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Build agent architectures that are fast, reliable, and actually pleasant to work with</p></li><li><p style=\"min-height:1.5em\">Research and ship techniques for agent reasoning, planning, and tool use</p></li><li><p style=\"min-height:1.5em\">Create evaluation pipelines so we can measure whether agents are getting better or worse</p></li><li><p style=\"min-height:1.5em\">Talk to users. Understand what's broken. Fix it.</p></li></ul><h2>What We're Looking For</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">5+ years shipping software</p></li><li><p style=\"mi
